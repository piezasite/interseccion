<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTAX SANCTUARY | Grial de Red</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --text-main: #cbd5e1;
            --text-muted: #64748b;
            --gold: #d4af37;
            --gold-bright: #f9e076;
            --gold-dark: #b8860b;
            --glass: rgba(15, 23, 42, 0.85);
            --border-glass: rgba(212, 175, 55, 0.25);
            --online: #10b981;
            --offline: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Scanlines y ruido de fondo estético */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        .grial-terminal {
            width: 92%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 35px;
            position: relative;
            z-index: 10;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(212, 175, 55, 0.05);
            text-align: center;
            transition: all 0.4s ease;
        }

        .header {
            font-size: 1.6rem;
            color: var(--gold-bright);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            font-weight: bold;
        }

        .nodes-container {
            max-height: 340px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 8px;
        }

        .node-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(100, 116, 139, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.15);
            margin: 12px 0;
            padding: 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: 0.3s;
            animation: slideIn 0.4s ease-out forwards;
        }

        .node-card:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            transform: translateX(6px);
            color: #fff;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        .status-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--online);
            box-shadow: 0 0 12px var(--online);
        }

        .btn-action {
            width: 100%;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--gold);
            color: var(--gold-bright);
            padding: 18px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-action:hover {
            background: var(--gold);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        /* Pantalla de ausencia / Mantenimiento */
        #offline-screen { display: none; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .avatar { 
            width: 100%; 
            max-width: 250px; 
            border-radius: 8px; 
            border: 1px solid var(--gold-dark); 
            margin: 22px 0; 
            opacity: 0.85;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        
        .narrative { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            line-height: 1.7; 
            font-style: italic; 
            padding: 0 10px;
            margin-bottom: 25px;
        }

        /* Scrollbar estilizada */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>

<div class="grial-terminal">
    <div class="header">SYNTAX_SANCTUARY</div>
    
    <div id="boot-sector">
        <button class="btn-action" onclick="desplegarImperio()">[ ACCEDER_AL_GRIAL ]</button>
    </div>

    <div id="monitor-ui" style="display:none;">
        <div id="nodes-list" class="nodes-container"></div>
    </div>

    <div id="offline-screen">
        <div style="color:var(--offline); font-weight:bold; letter-spacing: 2px; margin-bottom:10px;">[!] ESTADO: EN_REPOSO</div>
        <img src="avatar.png" class="avatar" alt="Archivista">
        <p class="narrative">
            "Mientras purifico textiles en el ciclo de luz, mi mente transmuta código en las sombras. Mis nexos duermen esperando el retorno del constructor."
        </p>
        <a href="https://wa.me/15058619970" class="btn-action" style="text-decoration:none; display:block;">[ CANAL_DIRECTO_WA ]</a>
    </div>
</div>

    <script>
(function() {
    const API_URL = 'https://adaptowebs.com/historias.php';
    const LEGAL_KEY = 'aw_legal_v2';
    
    // 1. ESTILOS DINÁMICOS
    const style = document.createElement('style');
    style.innerHTML = `
        body.locked { overflow: hidden !important; }
        #aw-legal-gate { position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:999999; display:flex; justify-content:center; align-items:center; font-family:sans-serif; }
        .aw-card { width:90%; max-width:500px; border:2px solid #d32f2f; padding:30px; border-radius:15px; }
        .aw-scroll { height:200px; overflow-y:auto; background:#f9f9f9; padding:10px; font-size:0.85rem; margin:15px 0; border:1px solid #eee; }
        
        #aw-stories-container { width:100%; padding:20px; display:flex; flex-wrap:wrap; gap:15px; justify-content:center; border-top:2px solid #eee; margin-top:50px; background:#fafafa; }
        .aw-sphere { width:70px; height:70px; border-radius:50%; border:3px solid #d32f2f; overflow:hidden; cursor:pointer; transition:0.3s; background:#000; }
        .aw-sphere:hover { transform:scale(1.1); }
        .aw-sphere video { width:100%; height:100%; object-fit:cover; }

        #aw-cam-ui { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000000; display:none; flex-direction:column; align-items:center; justify-content:center; }
        .aw-rec-btn { width:80px; height:80px; border-radius:50%; border:none; background:red; color:white; font-weight:bold; cursor:pointer; }
    `;
    document.head.appendChild(style);

    // 2. INYECCIÓN DE ESTRUCTURA
    document.body.insertAdjacentHTML('beforeend', `
        <div id="aw-legal-gate">
            <div class="aw-card">
                <h2 style="color:#d32f2f;margin:0">ADAPTOWEBS LEGAL</h2>
                <div class="aw-scroll">
                    <strong>PROYECTO INDEPENDIENTE:</strong> Sin sede física. Conocimiento basado en <strong>Udemy + IA</strong>. <br><br>
                    <strong>DISCLAIMER:</strong> Software en estado "As-Is". El autor se deslinda de responsabilidad por usos externos.<br><br>
                    <strong>RED EFÍMERA:</strong> Al usar la cámara, el video será público por 15 min y luego se eliminará permanentemente.
                </div>
                <label><input type="checkbox" id="aw-check"> Acepto términos y condiciones.</label>
                <button id="aw-accept-btn" disabled style="width:100%;margin-top:15px;padding:10px;background:#d32f2f;color:#fff;border:none;border-radius:5px;cursor:pointer;">ENTRAR AL SITIO</button>
            </div>
        </div>

        <button id="aw-open-cam" style="position:fixed; bottom:20px; right:20px; z-index:9999; display:none; background:#d32f2f; color:#fff; border:none; border-radius:50px; padding:15px 25px; font-weight:bold; cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.3);">📷 GRABAR HISTORIA</button>

        <div id="aw-cam-ui">
            <video id="aw-video-prev" autoplay muted style="width:90%; max-width:400px; border-radius:15px; transform:scaleX(-1);"></video>
            <div style="margin-top:20px; display:flex; gap:15px;">
                <button id="aw-main-rec" class="aw-rec-btn">REC</button>
                <button id="aw-cancel-cam" style="background:none; border:1px solid #fff; color:#fff; padding:10px 20px; cursor:pointer;">CERRAR</button>
            </div>
        </div>

        <div id="aw-stories-container">
            <p style="width:100%; text-align:center; color:#888; font-weight:bold;">HISTORIAS GLOBALES (15 MIN)</p>
        </div>
    `);

    // 3. LÓGICA DE CONTROL
    const gate = document.getElementById('aw-legal-gate');
    const check = document.getElementById('aw-check');
    const acceptBtn = document.getElementById('aw-accept-btn');
    const openCamBtn = document.getElementById('aw-open-cam');
    const camUI = document.getElementById('aw-cam-ui');
    const recBtn = document.getElementById('aw-main-rec');
    const cancelCam = document.getElementById('aw-cancel-cam');
    
    let recorder;
    let chunks = [];

    // FLUJO LEGAL
    if(localStorage.getItem(LEGAL_KEY)) {
        gate.style.display = 'none';
        openCamBtn.style.display = 'block';
        loadStories();
    } else {
        document.body.classList.add('locked');
    }

    check.onchange = () => acceptBtn.disabled = !check.checked;
    
    acceptBtn.onclick = () => {
        localStorage.setItem(LEGAL_KEY, 'true');
        gate.style.display = 'none';
        document.body.classList.remove('locked');
        openCamBtn.style.display = 'block';
        loadStories();
    };

    // DETONADOR DE CÁMARA
    openCamBtn.onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('aw-video-prev').srcObject = stream;
        camUI.style.display = 'flex';
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = upload;
    };

    cancelCam.onclick = () => {
        const stream = document.getElementById('aw-video-prev').srcObject;
        stream.getTracks().forEach(t => t.stop());
        camUI.style.display = 'none';
    };

    // GRABACIÓN
    recBtn.onclick = () => {
        if(recorder.state === "inactive") {
            chunks = [];
            recorder.start();
            recBtn.innerText = "STOP";
            recBtn.style.background = "#fff"; recBtn.style.color = "red";
        } else {
            recorder.stop();
            recBtn.innerText = "SUBIENDO...";
            recBtn.disabled = true;
        }
    };

    async function upload() {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ video: reader.result }) });
            location.reload();
        };
    }

    // CARGAR HISTORIAS EN EL DIV SEPARADO
    async function loadStories() {
        const container = document.getElementById('aw-stories-container');
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            data.forEach(s => {
                const sphere = document.createElement('div');
                sphere.className = 'aw-sphere';
                sphere.innerHTML = `<video src="${s.url}" autoplay muted loop></video>`;
                sphere.onclick = () => {
                    const v = document.createElement('video');
                    v.src = s.url; v.autoplay = true; v.controls = true;
                    v.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000000;";
                    v.onclick = () => v.remove();
                    document.body.appendChild(v);
                };
                container.appendChild(sphere);
            });
        } catch(e) {}
    }
})();
</script>


</body>
</html>
