<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTAX SANCTUARY | Grial de Red</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --text-main: #cbd5e1;
            --text-muted: #64748b;
            --gold: #d4af37;
            --gold-bright: #f9e076;
            --gold-dark: #b8860b;
            --glass: rgba(15, 23, 42, 0.85);
            --border-glass: rgba(212, 175, 55, 0.25);
            --online: #10b981;
            --offline: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Scanlines y ruido de fondo estético */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        .grial-terminal {
            width: 92%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 35px;
            position: relative;
            z-index: 10;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(212, 175, 55, 0.05);
            text-align: center;
            transition: all 0.4s ease;
        }

        .header {
            font-size: 1.6rem;
            color: var(--gold-bright);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            font-weight: bold;
        }

        .nodes-container {
            max-height: 340px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 8px;
        }

        .node-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(100, 116, 139, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.15);
            margin: 12px 0;
            padding: 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: 0.3s;
            animation: slideIn 0.4s ease-out forwards;
        }

        .node-card:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            transform: translateX(6px);
            color: #fff;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        .status-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--online);
            box-shadow: 0 0 12px var(--online);
        }

        .btn-action {
            width: 100%;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--gold);
            color: var(--gold-bright);
            padding: 18px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-action:hover {
            background: var(--gold);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        /* Pantalla de ausencia / Mantenimiento */
        #offline-screen { display: none; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .avatar { 
            width: 100%; 
            max-width: 250px; 
            border-radius: 8px; 
            border: 1px solid var(--gold-dark); 
            margin: 22px 0; 
            opacity: 0.85;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        
        .narrative { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            line-height: 1.7; 
            font-style: italic; 
            padding: 0 10px;
            margin-bottom: 25px;
        }

        /* Scrollbar estilizada */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>

<div class="grial-terminal">
    <div class="header">SYNTAX_SANCTUARY</div>
    
    <div id="boot-sector">
        <button class="btn-action" onclick="desplegarImperio()">[ ACCEDER_AL_GRIAL ]</button>
    </div>

    <div id="monitor-ui" style="display:none;">
        <div id="nodes-list" class="nodes-container"></div>
    </div>

    <div id="offline-screen">
        <div style="color:var(--offline); font-weight:bold; letter-spacing: 2px; margin-bottom:10px;">[!] ESTADO: EN_REPOSO</div>
        <img src="avatar.png" class="avatar" alt="Archivista">
        <p class="narrative">
            "Mientras purifico textiles en el ciclo de luz, mi mente transmuta código en las sombras. Mis nexos duermen esperando el retorno del constructor."
        </p>
        <a href="https://wa.me/15058619970" class="btn-action" style="text-decoration:none; display:block;">[ CANAL_DIRECTO_WA ]</a>
    </div>
</div>
<div id="aw-gatekeeper">


<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function emitirTono(f=1000) {
        try {
            const o=audio.createOscillator(), g=audio.createGain();
            o.type='sine'; o.frequency.value=f; g.gain.value=0.03;
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime+0.1);
        } catch(e) {}
    }

    // El mapa completo del Imperio Digital
    const nexos = [
        "https://adaptowebs.com", "https://db.adaptowebs.com",
        "https://mercancia.store", "https://db.mercancia.store",
        "https://syntaxsanctuary.com", "https://db.syntaxsanctuary.com",
        "https://timefinancehub.com", "https://db.timefinancehub.com",
        "https://phpframe.work", "https://db.phpframe.work",
        "https://piezas4websites.com", "https://db.piezas4websites.com"
    ];

    async function desplegarImperio() {
        if (audio.state === 'suspended') audio.resume();
        document.getElementById('boot-sector').style.display = 'none';
        document.getElementById('monitor-ui').style.display = 'block';
        
        const list = document.getElementById('nodes-list');
        let activos = 0;

        for (const url of nexos) {
            try {
                // Validación estricta por llave criptográfica
                const res = await fetch(`${url}/status.php?v=${Date.now()}`, { 
                    mode: 'cors',
                    cache: 'no-store'
                });
                
                // Si Cloudflare intercepta, devolverá HTML y esto fallará silenciosamente enviándolo al catch
                const data = await res.json();

                // Si es nuestro servidor, devolverá la llave
                if (data.key === "syntax-sanctuary-active") {
                    activos++; 
                    emitirTono(1200);
                    
                    const el = document.createElement('a');
                    el.className = 'node-card';
                    el.href = url;
                    el.target = "_blank";
                    
                    // Limpieza visual para el dashboard
                    const label = url.replace("https://", "").toUpperCase();
                    el.innerHTML = `<span>> ${label}</span><div class="status-dot"></div>`;
                    
                    list.appendChild(el);
                    
                    // Pequeña pausa para el efecto cascada visual
                    await new Promise(r => setTimeout(r, 120));
                }
            } catch (error) {
                // Nodo apagado, error 1033 o sin el archivo status.php
                // Se ignora y el escáner continúa
            }
        }

        // Si la bóveda está vacía, mostramos la realidad
        if (activos === 0) {
            emitirTono(250);
            document.getElementById('monitor-ui').style.display = 'none';
            document.getElementById('offline-screen').style.display = 'block';
        }
    }
</script>
    <script>
(function() {
    // 1. Crear e inyectar los ESTILOS (CSS)
    const css = `
        body.aw-locked { overflow: hidden !important; height: 100vh !important; }
        #aw-portal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 9999999; display: flex;
            justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .aw-modal-box {
            width: 90%; max-width: 500px; padding: 35px;
            background: #fff; border: 2px solid #d32f2f;
            border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }
        .aw-brand { color: #d32f2f; font-weight: 900; font-size: 1.8rem; display: block; margin-bottom: 5px; }
        .aw-tagline { font-size: 0.7rem; font-weight: 700; color: #999; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .aw-content {
            background: #f9f9f9; border-radius: 10px; padding: 15px; 
            height: 250px; overflow-y: auto; font-size: 0.9rem; 
            line-height: 1.6; color: #444; margin-bottom: 20px; border: 1px solid #eee;
        }
        .aw-label { display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; cursor: pointer; margin-bottom: 20px; font-weight: 600; }
        .aw-label input { scale: 1.3; accent-color: #d32f2f; margin-top: 3px; }
        .aw-btn {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: #d32f2f; color: #fff; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: 0.3s;
        }
        .aw-btn:disabled { background: #ffcdd2; cursor: not-allowed; }
    `;
    const styleSheet = document.createElement("style");
    styleSheet.innerText = css;
    document.head.appendChild(styleSheet);

    // 2. Crear e inyectar la ESTRUCTURA (HTML)
    const modalHTML = `
        <div id="aw-portal-overlay">
            <div class="aw-modal-box">
                <span class="aw-brand">ADAPTOWEBS</span>
                <span class="aw-tagline">Entidad Digital • Conocimiento Aplicado</span>
                <div class="aw-content">
                    <strong>AVISO IMPORTANTE:</strong> Este proyecto es una iniciativa 100% digital bajo autoría independiente. No cuenta con sede física ni locales comerciales.<br><br>
                    <strong>ORIGEN TÉCNICO:</strong> La arquitectura y scripts presentados son fruto de la formación en <strong>Udemy</strong> y la optimización mediante <strong>Inteligencia Artificial (IA)</strong>. El valor reside en el esfuerzo de desarrollo y la lógica implementada.<br><br>
                    <strong>ESTADO DEL SOFTWARE:</strong> Se entrega "As-Is" (como está). El autor no asume responsabilidad por el uso externo o fallos técnicos, al tratarse de un entorno de desarrollo continuo.<br><br>
                    <strong>SIN REGISTROS:</strong> Al continuar, aceptas que no existen marcas ni LLCs registradas de momento, reconociendo la propiedad intelectual del autor.
                </div>
                <label class="aw-label">
                    <input type="checkbox" id="aw-verify">
                    <span>Acepto la situación actual del proyecto y deseo continuar.</span>
                </label>
                <button id="aw-btn-go" class="aw-btn" disabled>ACCEDER AHORA</button>
            </div>
        </div>
    `;
    
    // Insertar el HTML al final del body
    document.body.insertAdjacentHTML('beforeend', modalHTML);

    // 3. Lógica de CONTROL
    const overlay = document.getElementById('aw-portal-overlay');
    const checkbox = document.getElementById('aw-verify');
    const button = document.getElementById('aw-btn-go');

    // Bloquear scroll
    document.body.classList.add('aw-locked');

    checkbox.addEventListener('change', function() {
        button.disabled = !this.checked;
    });

    button.addEventListener('click', function() {
        overlay.remove(); // Elimina el modal del DOM completamente
        document.body.classList.remove('aw-locked');
        console.log("Acceso Adaptowebs: Autorizado.");
    });
})();
</script>

</body>
</html>
