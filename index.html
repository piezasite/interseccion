<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTAX SANCTUARY | Grial de Red</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --text-main: #cbd5e1;
            --text-muted: #64748b;
            --gold: #d4af37;
            --gold-bright: #f9e076;
            --gold-dark: #b8860b;
            --glass: rgba(15, 23, 42, 0.85);
            --border-glass: rgba(212, 175, 55, 0.25);
            --online: #10b981;
            --offline: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Scanlines y ruido de fondo estético */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        .grial-terminal {
            width: 92%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 35px;
            position: relative;
            z-index: 10;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(212, 175, 55, 0.05);
            text-align: center;
            transition: all 0.4s ease;
        }

        .header {
            font-size: 1.6rem;
            color: var(--gold-bright);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            font-weight: bold;
        }

        .nodes-container {
            max-height: 340px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 8px;
        }

        .node-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(100, 116, 139, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.15);
            margin: 12px 0;
            padding: 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: 0.3s;
            animation: slideIn 0.4s ease-out forwards;
        }

        .node-card:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            transform: translateX(6px);
            color: #fff;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        .status-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--online);
            box-shadow: 0 0 12px var(--online);
        }

        .btn-action {
            width: 100%;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--gold);
            color: var(--gold-bright);
            padding: 18px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-action:hover {
            background: var(--gold);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        /* Pantalla de ausencia / Mantenimiento */
        #offline-screen { display: none; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .avatar { 
            width: 100%; 
            max-width: 250px; 
            border-radius: 8px; 
            border: 1px solid var(--gold-dark); 
            margin: 22px 0; 
            opacity: 0.85;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        
        .narrative { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            line-height: 1.7; 
            font-style: italic; 
            padding: 0 10px;
            margin-bottom: 25px;
        }

        /* Scrollbar estilizada */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>

<div class="grial-terminal">
    <div class="header">SYNTAX_SANCTUARY</div>
    
    <div id="boot-sector">
        <button class="btn-action" onclick="desplegarImperio()">[ ACCEDER_AL_GRIAL ]</button>
    </div>

    <div id="monitor-ui" style="display:none;">
        <div id="nodes-list" class="nodes-container"></div>
    </div>

    <div id="offline-screen">
        <div style="color:var(--offline); font-weight:bold; letter-spacing: 2px; margin-bottom:10px;">[!] ESTADO: EN_REPOSO</div>
        <img src="avatar.png" class="avatar" alt="Archivista">
        <p class="narrative">
            "Mientras purifico textiles en el ciclo de luz, mi mente transmuta código en las sombras. Mis nexos duermen esperando el retorno del constructor."
        </p>
        <a href="https://wa.me/15058619970" class="btn-action" style="text-decoration:none; display:block;">[ CANAL_DIRECTO_WA ]</a>
    </div>
</div>

    <script>
(function() {
    // 1. Configuración y Estado Global
    const STORAGE_KEY_LEGAL = 'aw_consent_verified';
    const API_URL = 'https://adaptowebs.com/historias.php';
    let mediaRecorder;
    let chunks = [];

    // 2. Inyección de estilos unificada
    const style = document.createElement("style");
    style.innerHTML = `
        .aw-lock { overflow: hidden !important; }
        #aw-master-layer { position:fixed; top:0; left:0; width:100%; height:100%; z-index:999999; }
        .aw-hidden { display: none !important; }
        .aw-visible { display: flex !important; }
    `;
    document.head.appendChild(style);

    // 3. Estructura HTML Única (Contiene todo)
    document.body.insertAdjacentHTML('beforeend', `
        <div id="aw-master-layer" class="aw-visible">
            <div id="aw-legal-modal" style="background:#fff; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                <div style="max-width:400px; text-align:center;">
                    <h1>ADAPTOWEBS</h1>
                    <p>Entidad digital independiente. Acepta términos para continuar.</p>
                    <input type="checkbox" id="aw-accept-check"> Acepto.<br><br>
                    <button id="aw-btn-start" disabled>ACCEDER</button>
                </div>
            </div>
            
            <div id="aw-cam-ui" class="aw-hidden" style="background:#000; width:100%; height:100%; align-items:center; justify-content:center; flex-direction:column;">
                <video id="aw-prev" autoplay muted style="width:90%; border-radius:15px;"></video>
                <div style="margin-top:20px;">
                    <button id="aw-rec-btn" style="padding:15px; background:red; color:white; border:none; border-radius:50px;">GRABAR</button>
                </div>
            </div>
        </div>
    `);

    // 4. Lógica de Control (El "Cerebro")
    const legalModal = document.getElementById('aw-legal-modal');
    const camUI = document.getElementById('aw-cam-ui');
    const recBtn = document.getElementById('aw-rec-btn');
    const prev = document.getElementById('aw-prev');

    // Botón Aceptar Legal
    document.getElementById('aw-accept-check').onchange = (e) => document.getElementById('aw-btn-start').disabled = !e.target.checked;
    
    document.getElementById('aw-btn-start').onclick = async () => {
        legalModal.classList.add('aw-hidden');
        camUI.classList.add('aw-visible');
        document.body.classList.remove('aw-lock');
        
        // Iniciar Cámara
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        prev.srcObject = stream;
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = uploadVideo;
    };

    // Lógica Grabación Mejorada
    recBtn.onclick = () => {
        if (mediaRecorder.state === "inactive") {
            chunks = [];
            mediaRecorder.start();
            recBtn.innerText = "DETENER";
            recBtn.style.background = "white";
            recBtn.style.color = "red";
        } else {
            mediaRecorder.stop();
            recBtn.innerText = "GRABANDO...";
            recBtn.disabled = true;
        }
    };

    async function uploadVideo() {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ video: reader.result }) });
            location.reload(); // Recarga limpia
        };
    }
})();
    </script>
    

</body>
</html>
