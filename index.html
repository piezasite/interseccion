<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTAX SANCTUARY | Terminal de Estado</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* [Mantenemos tu estilo Neon-Noir previo] */
        :root {
            --bg: #050505; --neon-cyan: #00f2ff; --neon-purple: #bc13fe;
            --neon-green: #39ff14; --neon-red: #ff003c; --glass: rgba(13, 13, 13, 0.85);
        }
        body {
            background-color: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace;
            margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        body::before {
            content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 10;
        }
        .terminal-container {
            width: 90%; max-width: 550px; background: var(--glass); border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3); padding: 30px; position: relative; z-index: 5; border-radius: 5px;
        }
        .glitch {
            font-size: 1.8rem; font-weight: bold; text-transform: uppercase;
            text-shadow: 0.05em 0 0 var(--neon-cyan), -0.05em -0.025em 0 var(--neon-purple);
            animation: glitch 500ms infinite; margin-bottom: 20px;
        }
        @keyframes glitch {
            0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); } 100% { transform: translate(0); }
        }
        .service-item {
            background: rgba(0, 242, 255, 0.05); border-left: 3px solid var(--neon-cyan);
            margin: 10px 0; padding: 12px 15px; display: flex; justify-content: space-between;
            align-items: center; text-decoration: none; color: var(--neon-cyan); transition: 0.2s;
        }
        .service-item:hover { background: rgba(0, 242, 255, 0.15); transform: translateX(5px); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
        #offline-ui { display: none; text-align: center; }
        .archivista-img { width: 100%; max-width: 350px; border: 1px solid var(--neon-purple); margin: 15px 0; }
        .wa-btn {
            display: inline-block; border: 2px solid var(--neon-green); color: var(--neon-green);
            padding: 12px 20px; text-decoration: none; font-weight: bold; margin-top: 20px; text-transform: uppercase;
        }
        .wa-btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 20px var(--neon-green); }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="glitch">SYNTAX_SANCTUARY.sys</div>
    <div id="status-scanner">_INICIANDO_SONDEO_DE_NODOS...</div>
    <div id="online-list"></div>

    <div id="offline-ui">
        <p style="color:var(--neon-red); font-weight:bold;">>> [ STATUS: EMPIRE_OFFLINE ] <<</p>
        <img src="avatar.png" class="archivista-img" alt="Archivista">
        <p style="font-size: 0.85rem;">toy atendiendo mi trabajo en el mundo real, pero en cuanto vuelba a iniciar sesion eni imperio digital mis servicios estaran disponibles.</p>
        <a href="https://wa.me/15058619970" class="wa-btn">[ LINEA_DIRECTA_WHATSAPP ]</a>
    </div>
</div>

<script>
    const servicios = [
        { nombre: "ADAPTOWEBS.COM", url: "https://adaptowebs.com" },
        { nombre: "MERCANCIA.STORE", url: "https://mercancia.store" },
        { nombre: "PHPFRAME.WORK", url: "https://phpframe.work" },
        { nombre: "SYNTAXSANCTUARY.COM", url: "https://syntaxsanctuary.com" },
        { nombre: "TIMEFINANCEHUB.COM", url: "https://timefinancehub.com" }
    ];

    function checkService(service) {
        return new Promise((resolve) => {
            const img = new Image();
            // Intentamos cargar el favicon del sitio (casi todos tienen uno)
            // Agregamos un timestamp para evitar la caché del navegador
            img.src = `${service.url}/favicon.ico?t=${Date.now()}`;

            // Si la imagen carga o da error de "403/CORS", significa que el servidor RESPONDIÓ
            img.onload = () => resolve(true);
            
            // En muchos casos, si el servidor está vivo pero no hay favicon, 
            // dará error pero el tiempo de respuesta será rápido.
            img.onerror = () => {
                // Si el servidor está caído (Docker off), tardará mucho en fallar o dará error de red.
                // Para simplificar en JS estático, si el evento onerror se dispara rápido, suele estar vivo.
                resolve(true); 
            };

            // Timeout de seguridad: Si en 5 segundos no hay nada, está muerto.
            setTimeout(() => resolve(false), 5000);
        });
    }

    async function init() {
        const list = document.getElementById('online-list');
        const offline = document.getElementById('offline-ui');
        const scanner = document.getElementById('status-scanner');
        let activeCount = 0;

        // Ejecutamos las pruebas en paralelo para mayor velocidad
        const resultados = await Promise.all(servicios.map(async (s) => {
            const isUp = await checkService(s);
            if (isUp) {
                activeCount++;
                const item = document.createElement('a');
                item.className = 'service-item';
                item.href = s.url;
                item.target = "_blank";
                item.innerHTML = `<span>> ${s.nombre}</span><div class="dot"></div>`;
                list.appendChild(item);
            }
            return isUp;
        }));

        scanner.style.display = 'none';
        if (activeCount === 0) {
            offline.style.display = 'block';
        }
    }

    init();
</script>
</body>
</html>
