<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTAX SANCTUARY | Terminal de Estado</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --glass: rgba(10, 10, 10, 0.98);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Scanlines & CRT Effect */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .terminal-frame {
            width: 92%;
            max-width: 500px;
            background: var(--glass);
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.4), inset 0 0 10px rgba(188, 19, 254, 0.2);
            padding: 25px;
            position: relative;
            z-index: 10;
            border-radius: 4px;
        }

        .header-glitch {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-purple);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .status-line {
            font-size: 0.8rem;
            color: var(--neon-cyan);
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .nodes-container {
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-purple) transparent;
        }

        .node-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 242, 255, 0.04);
            border-left: 3px solid var(--neon-cyan);
            margin: 6px 0;
            padding: 12px;
            text-decoration: none;
            color: var(--neon-cyan);
            font-size: 0.85rem;
            transition: 0.2s;
            animation: emerge 0.3s ease-out forwards;
        }

        .node-link:hover {
            background: rgba(0, 242, 255, 0.1);
            transform: translateX(4px);
        }

        @keyframes emerge { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .tag { font-size: 0.6rem; color: #555; border: 1px solid #333; padding: 2px 4px; margin-right: 8px; vertical-align: middle; }
        .alive-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }

        /* Mantenimiento UI */
        #offline-screen { display: none; text-align: center; animation: fadeIn 1s; }
        .avatar { width: 100%; max-width: 280px; border: 1px solid var(--neon-purple); margin: 15px 0; filter: grayscale(0.2) contrast(1.1); }
        .wa-button {
            display: inline-block;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .btn-init {
            background: none;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 15px 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="terminal-frame">
    <div class="header-glitch">SYNTAX_SANCTUARY</div>
    
    <div id="boot-sector">
        <button class="btn-init" onclick="initEmpire()">[ EJECUTAR_PROTOCOLO_DE_ACCESO ]</button>
    </div>

    <div id="monitor-ui" style="display:none;">
        <div id="scan-label" class="status-line">ESTABLECIENDO_CONEXIÓN_CON_NODOS...</div>
        <div id="nodes-list" class="nodes-container"></div>
    </div>

    <div id="offline-screen">
        <p style="color:var(--neon-red); font-weight:bold; letter-spacing: 2px;">[!] ALERTA: SISTEMAS_DESCONECTADOS</p>
        <img src="avatar.png" class="avatar" alt="Archivista">
        <p style="font-size: 0.8rem; line-height: 1.5; color: #bbb;">
            toy atendiendo mi trabajo en el mundo real, pero en cuanto vuelba a iniciar sesion eni imperio digital mis servicios estaran disponibles.
        </p>
        <a href="https://wa.me/15058619970" class="wa-button">[ CONTACTO_DIRECTO_WHATSAPP ]</a>
    </div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTone(freq, type, dur, vol) {
        const osc = audio.createOscillator();
        const g = audio.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audio.currentTime);
        g.gain.setValueAtTime(vol, audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + dur);
        osc.connect(g);
        g.connect(audio.destination);
        osc.start();
        osc.stop(audio.currentTime + dur);
    }

    const nexos = [
        { id: "ROOT", n: "SYNTAXSANCTUARY.COM", u: "https://syntaxsanctuary.com" },
        { id: "PMA", n: "DB.SYNTAXSANCTUARY.COM", u: "https://db.syntaxsanctuary.com" },
        { id: "WEB", n: "ADAPTOWEBS.COM", u: "https://adaptowebs.com" },
        { id: "PMA", n: "DB.ADAPTOWEBS.COM", u: "https://db.adaptowebs.com" },
        { id: "SHOP", n: "MERCANCIA.STORE", u: "https://mercancia.store" },
        { id: "PMA", n: "DB.MERCANCIA.STORE", u: "https://db.mercancia.store" },
        { id: "CORE", n: "PHPFRAME.WORK", u: "https://phpframe.work" },
        { id: "PMA", n: "DB.PHPFRAME.WORK", u: "https://db.phpframe.work" },
        { id: "FIN", n: "TIMEFINANCEHUB.COM", u: "https://timefinancehub.com" }
    ];

    async function verify(url) {
        return new Promise((res) => {
            const img = new Image();
            const start = Date.now();
            // Timeout de 3 segundos para evitar esperas infinitas en móviles
            const fail = setTimeout(() => { img.src = ""; res(false); }, 3000);

            // Blindaje: Cache buster por milisegundos
            img.src = `${url}/favicon.ico?v=${start}`;

            img.onload = () => { clearTimeout(fail); res(true); };
            img.onerror = () => {
                clearTimeout(fail);
                // Si el error de red es casi instantáneo (< 600ms), el servidor está vivo pero bloquea CORS
                res((Date.now() - start) < 600);
            };
        });
    }

    async function initEmpire() {
        if (audio.state === 'suspended') audio.resume();
        playTone(440, 'sine', 0.2, 0.1); // Pitido de inicio
        
        document.getElementById('boot-sector').style.display = 'none';
        document.getElementById('monitor-ui').style.display = 'block';
        
        const list = document.getElementById('nodes-list');
        const screenOff = document.getElementById('offline-screen');
        let counter = 0;

        for (const node of nexos) {
            const online = await verify(node.u);
            if (online) {
                counter++;
                playTone(1200, 'square', 0.05, 0.05); // Sonido de nodo encontrado
                
                const el = document.createElement('a');
                el.className = 'node-link';
                el.href = node.u;
                el.target = "_blank";
                el.innerHTML = `<div><span class="tag">${node.id}</span>${node.n}</div><div class="alive-dot"></div>`;
                list.appendChild(el);
                await new Promise(r => setTimeout(r, 150));
            }
        }

        document.getElementById('scan-label').innerText = `PROTOCOLO_FINALIZADO: ${counter} NODOS_ACTIVOS`;
        
        if (counter === 0) {
            playTone(150, 'sawtooth', 0.5, 0.1); // Sonido de error crítico
            document.getElementById('monitor-ui').style.display = 'none';
            screenOff.style.display = 'block';
        }
    }
</script>
</body>
</html>
