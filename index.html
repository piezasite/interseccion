
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTAX SANCTUARY | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --neon-green: #39ff14; --neon-red: #ff003c; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%); background-size: 100% 4px; z-index: 100; pointer-events: none; }
        .terminal { width: 90%; max-width: 500px; background: rgba(10, 10, 10, 0.98); border: 2px solid var(--neon-purple); padding: 25px; box-shadow: 0 0 20px var(--neon-purple); z-index: 10; border-radius: 5px; text-align: center; }
        .glitch { font-size: 1.5rem; font-weight: bold; text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-purple); margin-bottom: 20px; letter-spacing: 2px; }
        .node-link { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 242, 255, 0.05); border-left: 3px solid var(--neon-cyan); margin: 8px 0; padding: 12px; text-decoration: none; color: var(--neon-cyan); font-size: 0.85rem; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
        #offline-screen { display: none; }
        .avatar { width: 100%; max-width: 280px; border: 1px solid var(--neon-purple); margin: 15px 0; }
        .wa-btn { display: inline-block; border: 2px solid var(--neon-green); color: var(--neon-green); padding: 12px 24px; text-decoration: none; font-weight: bold; margin-top: 15px; text-transform: uppercase; }
        .start-btn { background: none; border: 2px solid var(--neon-cyan); color: var(--neon-cyan); padding: 15px 30px; cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="glitch">SYNTAX_SANCTUARY.sys</div>
    <div id="boot-sector"><button class="start-btn" onclick="analizarImperio()">[ INICIAR_SONDEO_PRIORITARIO ]</button></div>
    <div id="monitor-ui" style="display:none;"><div id="nodes-list"></div></div>
    <div id="offline-screen">
        <p style="color:var(--neon-red); font-weight:bold;">[!] STATUS: TUNNEL_DISCONNECTED</p>
        <img src="avatar.png" class="avatar" alt="Archivista">
        <p style="font-size: 0.8rem; line-height: 1.4;">toy atendiendo mi trabajo en el mundo real, pero en cuanto vuelba a iniciar sesion eni imperio digital mis servicios estaran disponibles.</p>
        <a href="https://wa.me/15058619970" class="wa-btn">[ LINEA_DIRECTA_WA ]</a>
    </div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f=800) {
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='square'; o.frequency.value=f; g.gain.value=0.03;
        o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime+0.1);
    }

    // LISTA ORDENADA: phpframe y piezas4websites primero
    const nexos = [
        "https://phpframe.work", "https://db.phpframe.work",
        "https://piezas4websites.com", "https://db.piezas4websites.com",
        "https://adaptowebs.com", "https://db.adaptowebs.com",
        "https://mercancia.store", "https://db.mercancia.store",
        "https://syntaxsanctuary.com", "https://db.syntaxsanctuary.com",
        "https://timefinancehub.com", "https://db.timefinancehub.com"
    ];

    async function analizarImperio() {
        if (audio.state === 'suspended') audio.resume();
        document.getElementById('boot-sector').style.display = 'none';
        document.getElementById('monitor-ui').style.display = 'block';
        const list = document.getElementById('nodes-list');
        let activos = 0;

        for (const url of nexos) {
            const start = Date.now();
            const vivo = await new Promise(res => {
                const img = new Image();
                const timeout = setTimeout(() => res(false), 3000);
                
                img.onload = () => { clearTimeout(timeout); res(true); };
                img.onerror = () => {
                    clearTimeout(timeout);
                    const rtt = Date.now() - start;
                    // Filtro de 100ms para diferenciar Error 1033 (rápido) de Docker (lento)
                    res(rtt > 100); 
                };
                img.src = `${url}/favicon.ico?v=${start}`;
            });

            if (vivo) {
                activos++; beep(1000);
                const name = url.replace("https://", "").toUpperCase();
                const el = document.createElement('a');
                el.className = 'node-link';
                el.href = url;
                el.target = "_blank";
                el.innerHTML = `<span>> ${name}</span><div class="dot"></div>`;
                list.appendChild(el);
                await new Promise(r => setTimeout(r, 150));
            }
        }

        if (activos === 0) {
            beep(200);
            document.getElementById('monitor-ui').style.display = 'none';
            document.getElementById('offline-screen').style.display = 'block';
        }
    }
</script>
</body>
</html>
