<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTAX SANCTUARY | Grial de Red</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --text-main: #cbd5e1;
            --text-muted: #64748b;
            --gold: #d4af37;
            --gold-bright: #f9e076;
            --gold-dark: #b8860b;
            --glass: rgba(15, 23, 42, 0.8);
            --border-glass: rgba(212, 175, 55, 0.2);
            --online: #10b981;
            --offline: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Scanlines */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        .grial-terminal {
            width: 92%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 35px;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(212, 175, 55, 0.1);
            text-align: center;
        }

        .header {
            font-size: 1.5rem;
            color: var(--gold-bright);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .nodes-container {
            max-height: 320px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 5px;
        }

        .node-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(100, 116, 139, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.1);
            margin: 10px 0;
            padding: 15px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 6px;
            transition: 0.3s;
            animation: slideIn 0.4s ease-out forwards;
        }

        .node-card:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
            transform: translateX(5px);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--online);
            box-shadow: 0 0 10px var(--online);
        }

        .btn-action {
            width: 100%;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-action:hover {
            background: var(--gold);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        #offline-screen { display: none; }
        .avatar { width: 100%; max-width: 240px; border-radius: 8px; border: 1px solid var(--gold-dark); margin: 20px 0; opacity: 0.8; }
        .narrative { font-size: 0.75rem; color: var(--text-muted); line-height: 1.6; font-style: italic; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 10px; }
    </style>
</head>
<body>

<div class="grial-terminal">
    <div class="header">SYNTAX_SANCTUARY</div>
    
    <div id="boot-sector">
        <button class="btn-action" onclick="deepScan()">[ EJECUTAR_SONDEO_HIBRIDO ]</button>
    </div>

    <div id="monitor-ui" style="display:none;">
        <div id="nodes-list" class="nodes-container"></div>
    </div>

    <div id="offline-screen">
        <div style="color:var(--offline); font-weight:bold; margin-bottom:10px;">[!] STATUS: DISCONNECTED</div>
        <img src="avatar.png" class="avatar" alt="Archivista">
        <p class="narrative">
            "Mientras purifico textiles en el ciclo de luz, mi mente transmuta código en las sombras. Mis nexos duermen esperando el retorno del constructor."
        </p>
        <a href="https://wa.me/15058619970" class="btn-action" style="text-decoration:none; display:block;">[ CONTACTO_DIRECTO_WA ]</a>
    </div>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f=1000) {
        const o=audio.createOscillator(), g=audio.createGain();
        o.type='sine'; o.frequency.value=f; g.gain.value=0.02;
        o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime+0.1);
    }

    // Lista ordenada según tu requerimiento
    const nexos = [
        "https://adaptowebs.com", "https://db.adaptowebs.com",
        "https://mercancia.store", "https://db.mercancia.store",
        "https://syntaxsanctuary.com", "https://db.syntaxsanctuary.com",
        "https://timefinancehub.com", "https://db.timefinancehub.com",
        "https://phpframe.work", "https://db.phpframe.work",
        "https://piezas4websites.com", "https://db.piezas4websites.com"
    ];

    async function deepScan() {
        if (audio.state === 'suspended') audio.resume();
        document.getElementById('boot-sector').style.display = 'none';
        document.getElementById('monitor-ui').style.display = 'block';
        const list = document.getElementById('nodes-list');
        let activos = 0;

        for (const url of nexos) {
            try {
                const start = Date.now();
                // Híbrido: Comprobamos latencia Y el contenido del archivo PHP
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), 4500);

                const res = await fetch(`${url}/status.php?v=${start}`, { 
                    mode: 'cors', 
                    signal: controller.signal 
                });
                
                const data = await res.json();
                const rtt = Date.now() - start;
                clearTimeout(tid);

                // BLINDAJE: Solo si la llave es correcta Y la latencia es real (>250ms por el túnel)
                if (data.key === "syntax-sanctuary-active" && rtt > 250) {
                    activos++; beep(1200);
                    const el = document.createElement('a');
                    el.className = 'node-card';
                    el.href = url;
                    el.target = "_blank";
                    const label = url.replace("https://", "").toUpperCase();
                    el.innerHTML = `<span>> ${label}</span><div class="status-dot"></div>`;
                    list.appendChild(el);
                    await new Promise(r => setTimeout(r, 120));
                }
            } catch (e) {
                console.warn(`Nodo ${url} ignorado (Fallo de firma o latencia).`);
            }
        }

        if (activos === 0) {
            beep(200);
            document.getElementById('monitor-ui').style.display = 'none';
            document.getElementById('offline-screen').style.display = 'block';
        }
    }
</script>
</body>
</html>
