<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTAX SANCTUARY | Terminal de Estado</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --glass: rgba(13, 13, 13, 0.85);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Capa de líneas CRT (Scanlines) */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .terminal-container {
            width: 90%;
            max-width: 550px;
            background: var(--glass);
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3), inset 0 0 15px rgba(188, 19, 254, 0.2);
            padding: 30px;
            position: relative;
            z-index: 5;
            border-radius: 5px;
        }

        /* EFECTO GLITCH PARA EL TITULO */
        .glitch {
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 var(--neon-cyan), -0.05em -0.025em 0 var(--neon-purple);
            animation: glitch 500ms infinite;
            margin-bottom: 20px;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* LISTA DE SERVICIOS */
        .service-list { margin-top: 20px; }

        .service-item {
            background: rgba(0, 242, 255, 0.05);
            border-left: 3px solid var(--neon-cyan);
            margin: 10px 0;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--neon-cyan);
            transition: 0.2s;
        }

        .service-item:hover {
            background: rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 10px var(--neon-cyan);
            transform: translateX(5px);
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
        }

        /* UI OFFLINE */
        #offline-ui { display: none; text-align: center; animation: fadeIn 1s; }

        .archivista-img {
            width: 100%;
            max-width: 350px;
            border: 1px solid var(--neon-purple);
            filter: hue-rotate(280deg) contrast(1.2); /* Ajuste de color Cyberpunk */
            margin: 15px 0;
        }

        .pause-msg {
            color: var(--neon-red);
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: glitch 750ms infinite; /* Glitch más lento para el mensaje de pausa */
        }

        .wa-btn {
            display: inline-block;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 20px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .wa-btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        #status-scanner { color: var(--neon-cyan); font-size: 0.9rem; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="glitch">SYNTAX_SANCTUARY.sys</div>
    
    <div id="status-scanner">_SCANNING_PERIMETER...</div>

    <div id="online-list" class="service-list"></div>

    <div id="offline-ui">
        <p class="pause-msg">>> [ STATUS: EMPIRE_IDLE ] <<</p>
        
        <img src="avatar.png" class="archivista-img" alt="Archivista del Stack">
        
        <p style="font-size: 0.85rem; line-height: 1.4;">
            Estoy atendiendo mi trabajo en el mundo real, pero en cuanto vuelva a iniciar sesión en mi imperio digital mis servicios estarán disponibles.
        </p>
        
        <a href="https://wa.me/15058619970?text=Hola,%20solicito%20asistencia%20técnica%20de%20emergencia" class="wa-btn">
            [ ESTABLECER_LINEA_DIRECTA ]
        </a>
    </div>
</div>

<script>
    // CONFIGURACIÓN DE TUS SERVICIOS
    // El script verificará estas URLs reales.
    const servicios = [
        { nombre: "ADAPTOWEBS.COM", url: "https://adaptowebs.com" },
        { nombre: "MERCANCIA.STORE", url: "https://mercancia.store" },
        { nombre: "PHPFRAME.WORK", url: "https://phpframe.work" },
        { nombre: "SYNTAXSANCTUARY.COM", url: "https://syntaxsanctuary.com" },
        { nombre: "TIMEFINANCEHUB.COM", url: "https://timefinancehub.com" }
    ];

    async function scanNetwork() {
        const list = document.getElementById('online-list');
        const offline = document.getElementById('offline-ui');
        const scanner = document.getElementById('status-scanner');
        let activeCount = 0;

        for (const s of servicios) {
            try {
                // Fetch con timeout y cache buster para evitar falsos positivos
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000); // 4 segundos de espera

                const response = await fetch(`${s.url}?cache=${Date.now()}`, { 
                    mode: 'cors', // Necesario para verificar el estado real (200 OK)
                    cache: 'no-store',
                    signal: controller.signal 
                });

                if (response.ok) {
                    // Solo si la respuesta es OK (200), añadimos el nodo a la lista
                    const item = document.createElement('a');
                    item.className = 'service-item';
                    item.href = s.url;
                    item.target = "_blank";
                    item.innerHTML = `<span>> ${s.nombre}</span><div class="dot"></div>`;
                    list.appendChild(item);
                    activeCount++;
                }
            } catch (e) {
                // Si hay error de conexión o timeout (Docker apagado), no hacemos nada aquí
                console.warn(`Nodo ${s.nombre} inaccesible (Docker detenido o error de red).`);
            }
        }

        // Ocultar el escáner de carga
        scanner.style.display = 'none';

        // Si NO hay servicios activos, mostramos la interfaz offline total
        if (activeCount === 0) {
            offline.style.display = 'block';
        }
    }

    // Iniciar el escaneo al cargar la página
    scanNetwork();
</script>

</body>
</html>
